<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - NESA Past Papers Portal</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>NESA<span>Portal</span></h2>
                <p>Admin Panel</p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/admin/dashboard.html">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a href="/admin/manage-papers.html">
                    <i class="fas fa-file-pdf"></i> Manage Papers
                </a>
                <a href="/admin/analytics.html" class="active">
                    <i class="fas fa-chart-line"></i> Analytics
                </a>
                <a href="#" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>Analytics Dashboard</h1>
                <button class="btn btn-secondary" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i> Refresh Data
                </button>
            </div>
            
            <!-- Summary Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Papers</h3>
                    <div class="value" id="totalPapers">0</div>
                </div>
                <div class="stat-card">
                    <h3>Active Papers</h3>
                    <div class="value" id="activePapers">0</div>
                </div>
                <div class="stat-card">
                    <h3>Total Visits</h3>
                    <div class="value" id="totalVisits">0</div>
                </div>
                <div class="stat-card">
                    <h3>Total Downloads</h3>
                    <div class="value" id="totalDownloads">0</div>
                </div>
            </div>
            
            <!-- Charts -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h3><i class="fas fa-users"></i> Visitors (Last 30 Days)</h3>
                    <div class="chart-container">
                        <canvas id="visitorsChart"></canvas>
                    </div>
                </div>
                
                <div class="chart-card">
                    <h3><i class="fas fa-calendar"></i> Papers by Year</h3>
                    <div class="chart-container">
                        <canvas id="papersYearChart"></canvas>
                    </div>
                </div>
                
                <div class="chart-card">
                    <h3><i class="fas fa-chart-pie"></i> Subject Distribution</h3>
                    <div class="chart-container">
                        <canvas id="subjectsChart"></canvas>
                    </div>
                </div>
            </div>
            
            <!-- Detailed Stats -->
            <div class="stats-grid-2">
                <div class="chart-card">
                    <h3><i class="fas fa-list"></i> Papers by Year</h3>
                    <div id="papersByYearList" class="stats-list"></div>
                </div>
                
                <div class="chart-card">
                    <h3><i class="fas fa-tags"></i> Papers by Subject</h3>
                    <div id="papersBySubjectList" class="stats-list"></div>
                </div>
            </div>
            
            <!-- Most Downloaded -->
            <div class="chart-card">
                <h3><i class="fas fa-download"></i> Most Downloaded Paper</h3>
                <div id="mostDownloaded" class="most-downloaded-container"></div>
            </div>
        </main>
    </div>
    
    <!-- Notification Container -->
    <div id="notificationContainer"></div>
    
    <script src="/js/auth.js"></script>
    <script src="/admin/js/analytics.js"></script>
</body>
</html>
